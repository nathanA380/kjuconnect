<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fonctionnalité Bientôt</title>
<style>
  @font-face {
    font-family: 'agrandir';
    src: url(Agrandir-Regular.otf) format('opentype');
  }

  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: 'agrandir', sans-serif;
    background: linear-gradient(135deg, #DBFCFF 0%, #F9F9F9 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .box {
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 420px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    animation: fadeIn 0.8s ease forwards;
  }

  .emoji {
    font-size: 3.5rem;
    margin-bottom: 15px;
    animation: bounce 1.2s infinite alternate ease-in-out;
  }

  h1 {
    font-size: 2rem;
    color: #7F96FF;
    margin-bottom: 12px;
  }

  p {
    font-size: 1.1rem;
    color: #1c1c1c;
    margin-bottom: 25px;
    line-height: 1.5;
  }

  button {
    padding: 12px 28px;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(12px);
    color: #1c1c1c;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
  }

  button:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: translateY(-2px);
  }

  @keyframes bounce {
    0% { transform: translateY(0); }
    100% { transform: translateY(-12px); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="box">
  <div class="emoji">🚀</div>
  <h1>Hey !</h1>
  <p>On bosse dur pour toi…<br>Cette fonctionnalité débarque très bientôt !<br>Reste dans le coin, ça va valoir le coup 😎</p>
  <button onclick="window.location.href='index.html'">🏠 Retour au menu</button>
</div>

</body>
</html>
