<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJU Connect</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#62C370">

<style>
@font-face {
    font-family: 'agrandir';
    src: url(Agrandir-Regular.otf) format('opentype');
}

body {
    font-family: 'agrandir', sans-serif;
    background: #DBFCFF;
    margin: 0;
    padding: 0;
    color: #1c1c1c;
}

/* Container principal pour le contenu au-dessus de la navbar */
.container {
    max-width: 600px;
    margin: 0 auto;
    padding-bottom: 80px; /* espace pour navbar */
    padding-top: 20px;
}

/* Brutalist Card */
.card {
    background: #fff;
    border-radius: 18px 50px 12px 30px;
    box-shadow: 6px 6px 0px #1c1c1c;
    margin: 15px;
    padding: 25px;
    text-align: center;
    border: 3px solid #1c1c1c;
    transition: transform 0.15s ease-in-out;
}

.card:hover {
    transform: translate(-3px, -3px);
    box-shadow: 9px 9px 0px #1c1c1c;
}

.card h2 {
    margin-top: 0;
    font-size: 1.6rem;
    color: #E56399;
}

.card p {
    font-size: 0.95rem;
    margin: 10px 0 0 0;
}

/* Boutons */
.btn {
    display: inline-block;
    padding: 12px 22px;
    background: #62C370;
    color: #fff;
    border: 3px solid #1c1c1c;
    border-radius: 10px 25px 6px 20px;
    text-decoration: none;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
    font-weight: bold;
    box-shadow: 4px 4px 0px #1c1c1c;
    transition: transform 0.15s ease-in-out, background 0.2s;
}

.btn:hover {
    background: #7F96FF;
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0px #1c1c1c;
}

.btn:active {
    background: #FFBE0B;
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0px #1c1c1c;
}

/* Images dans les cartes */
img {
    max-width: 120px;
    margin: 12px;
    border: 3px solid #1c1c1c;
    border-radius: 12px 28px 8px 18px;
    box-shadow: 5px 5px 0px #1c1c1c;
    background: #fff;
}

/* Navbar mobile */
.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: #fff;
    border-top: 3px solid #1c1c1c;
    box-shadow: 0 -3px 5px rgba(0,0,0,0.2);
    padding: 10px 0;
    z-index: 1000;
}

.navbar a {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #1c1c1c;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
}

.navbar a span {
    font-size: 20px; /* pour emoji/icône */
    margin-bottom: 3px;
}

.navbar a:hover {
    color: #62C370;
}
</style>
</head>
<body>

<div class="container">

    <div class="card">
        <h2>Bienvenue sur KJU Connect</h2>
        <p>Tout ce dont tu as besoin pour ton lycée en une seule application web !</p>
        <img src="icon-192.png" alt="KJU Connect Logo">
        <br>
        <a href="soon.html" class="btn">Découvrir</a>
    </div>

    <div class="card">
        <h2>Installation</h2>
        <p>Ajoute KJU Connect à ton écran d'accueil en cliquant sur partager, puis "sur l'écran d'accueil</p>

</div>

<!-- Navbar fixe -->
<div class="navbar">
    <a href="cl.html">
        <span>🎓</span>
        Carte Lycéen
    </a>
    <a href="cc.html">
        <span>🍽️</span>
        Carte Cantine
    </a>
    <a href="#" onclick="openPronote()">
        <span>📚</span>
        EDT / Pronote
    </a>
    <a href="soon.html">
        <span>📝</span>
        Mémos
    </a>
</div>

<script>
// Ouvrir l'app Pronote si possible
function openPronote() {
    let opened = false;
    window.location = "pronote://";
    setTimeout(() => {
        if(!opened) window.location = "https://0330023w.index-education.net/pronote/eleve.html";
    }, 500);
}

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker enregistré', reg))
      .catch(err => console.log('Erreur Service Worker', err));
  });
}
</script>

</body>
</html>
