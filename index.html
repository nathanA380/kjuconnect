<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJU Connect</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#62C370">

<style>
@font-face {
    font-family: 'agrandir';
    src: url(Agrandir-Regular.otf) format('opentype');
}

body {
    font-family: 'agrandir', sans-serif;
    background: linear-gradient(135deg, #DBFCFF 0%, #F9F9F9 100%);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    min-height: 100vh;
    color: #1c1c1c;
}

.container {
    max-width: 600px;
    width: 100%;
    padding: 20px;
    padding-bottom: 120px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 28px;
}

.card {
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(18px);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    padding: 28px;
    text-align: center;
    transition: transform 0.25s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.card h2 {
    margin-top: 0;
    font-size: 1.5rem;
    color: #62C370;
}

.card p {
    font-size: 1rem;
    margin: 12px 0 0 0;
    color: #333;
    line-height: 1.5;
}

.btn {
    display: inline-block;
    padding: 12px 28px;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(12px);
    color: #1c1c1c;
    border-radius: 12px;
    text-decoration: none;
    font-size: 16px;
    cursor: pointer;
    margin-top: 18px;
    font-weight: 600;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}

.btn:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: translateY(-2px);
}

img {
    max-width: 100px;
    margin: 15px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    background: #fff;
}

.navbar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 520px;
    display: flex;
    justify-content: space-around;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(20px);
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    padding: 12px 0;
    z-index: 1000;
}

.navbar a {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #1c1c1c;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.3s ease;
}

.navbar a span {
    font-size: 20px;
    margin-bottom: 4px;
}

.navbar a:hover {
    color: #62C370;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Bienvenue sur KJU Connect</h2>
        <p>Tout ce dont tu as besoin pour ton lycée en une seule application web !</p>
        <img src="icon-192.png" alt="KJU Connect Logo">
        <br>
        <a href="soon.html" class="btn">Découvrir</a>
    </div>

    <div class="card">
        <h2>Installation</h2>
        <p>Ajoute KJU Connect à ton écran d'accueil en cliquant sur <strong>Partager</strong>, puis <strong>"Sur l'écran d'accueil"</strong>.</p>
    </div>
</div>

<div class="navbar">
    <a href="cl.html">
        <span>🎓</span>
        Carte Lycéen
    </a>
    <a href="cc.html">
        <span>🍽️</span>
        Carte Cantine
    </a>
    <a href="#" onclick="openPronote()">
        <span>📚</span>
        EDT / Pronote
    </a>
    <a href="soon.html">
        <span>📝</span>
        Mémos
    </a>
</div>

<script>
function openPronote() {
    let opened = false;
    window.location = "pronote://";
    setTimeout(() => {
        if(!opened) window.location = "https://0330023w.index-education.net/pronote/eleve.html";
    }, 500);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker enregistré', reg))
      .catch(err => console.log('Erreur Service Worker', err));
  });
}
</script>

</body>
</html>
