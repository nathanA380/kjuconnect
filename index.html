<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJU Connect</title>
<link rel="manifest" href="manifest.json">
<style>
@font-face {
    font-family: 'agrandir';
    src: url(Agrandir-Regular.otf) format('opentype');
}

body {
    font-family: 'agrandir', sans-serif;
    background: #DBFCFF;
    margin: 0;
    padding: 20px;
    color: #1c1c1c;
}

.container {
    max-width: 600px;
    margin: auto;
}

/* Brutalist Card */
.card {
    background: #fff;
    border-radius: 18px 50px 12px 30px;
    box-shadow: 6px 6px 0px #1c1c1c; 
    margin-bottom: 30px;
    padding: 25px;
    text-align: center;
    border: 3px solid #1c1c1c;
    transition: transform 0.15s ease-in-out;
}

.card:hover {
    transform: translate(-3px, -3px);
    box-shadow: 9px 9px 0px #1c1c1c;
}

.card h2 {
    margin-top: 0;
    font-size: 1.6rem;
    color: #E56399;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 12px 22px;
    background: #62C370;
    color: #fff;
    border: 3px solid #1c1c1c;
    border-radius: 10px 25px 6px 20px;
    text-decoration: none;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
    font-weight: bold;
    box-shadow: 4px 4px 0px #1c1c1c;
    transition: transform 0.15s ease-in-out, background 0.2s;
}

.btn:hover {
    background: #7F96FF;
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0px #1c1c1c;
}

.btn:active {
    background: #FFBE0B;
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0px #1c1c1c;
}

img {
    max-width: 120px;
    margin: 12px;
    border: 3px solid #1c1c1c;
    border-radius: 12px 28px 8px 18px;
    box-shadow: 5px 5px 0px #1c1c1c;
    background: #fff;
}
</style>

</head>
<body>
<div class="container">

    <!-- Carte Lycéen -->
    <div class="card">
        <h2>Carte Lycéen</h2>
        <button class="btn" onclick="window.location.href='cl.html'">View Card</button>
    </div>

    <!-- Carte Cantine / Restaurant -->
    <div class="card">
        <h2>Carte de Cantine</h2>
        <button class="btn" onclick="window.location.href='cc.html'">View Card</button>
    </div>

    <!-- EDT / Pronote -->
    <div class="card">
        <h2>EDT / Pronote</h2>
        <p>Accédez à vos notes, emploi du temps et devoirs.</p>
        <button class="btn" onclick="openPronote()">Ouvrir Pronote</button>
    </div>

    <!-- Stockage de 3 images -->
    <div class="card">
        <h2>Mes mémos</h2>
        <button class="btn" onclick="window.location.href='soon.html'">Gérer mes mémos</button> <!--Rempalcer Soon par memo quand c'est prêt -->
    </div>

</div>

<script>
// Fonction pour tenter d'ouvrir l'app Pronote
function openPronote() {
    let opened = false;
    window.location = "pronote://";
    setTimeout(() => {
        if(!opened) window.location = "https://0330023w.index-education.net/pronote/eleve.html";
    }, 500);
}



// Ouvrir ou créer la DB
let db;
const request = indexedDB.open("KJUConnectDB", 1);

request.onerror = function(event) {
    console.error("Erreur IndexedDB", event);
};

request.onsuccess = function(event) {
    db = event.target.result;
    afficherImages();
};

request.onupgradeneeded = function(event) {
    db = event.target.result;
    const objectStore = db.createObjectStore("images", { keyPath: "id", autoIncrement: true });
    objectStore.createIndex("data", "data", { unique: false });
};

// Ajouter image
document.getElementById("fileInput").addEventListener("change", function(e){
const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(){
        const transaction = db.transaction(["images"], "readwrite");
        const store = transaction.objectStore("images");
        store.add({ data: reader.result });
        transaction.oncomplete = () => afficherImages();
    }
    reader.readAsDataURL(file);
});

// Afficher images
function afficherImages(){
    const container = document.getElementById("images");
    container.innerHTML = "";
    const transaction = db.transaction(["images"], "readonly");
    const store = transaction.objectStore("images");
    const request = store.openCursor();
    request.onsuccess = function(event) {
        const cursor = event.target.result;
        if(cursor){
            const img = document.createElement("img");
            img.src = cursor.value.data;
            container.appendChild(img);
            cursor.continue();
        }
    }
}

// Supprimer toutes les images
document.getElementById("clearImages").addEventListener("click", function(){
    const transaction = db.transaction(["images"], "readwrite");
    const store = transaction.objectStore("images");
    store.clear().onsuccess = () => afficherImages();
});
</script>
</body>
</html>
