<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Lycéen</title>
<style>
  @font-face {
    font-family: 'agrandir';
    src: url(Agrandir-Regular.otf) format('opentype');
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: 'agrandir', sans-serif;
    background: #DBFCFF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* Photo en plein écran */
  #photoContainer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #DBFCFF;
  }

  #photoContainer img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Bouton flottant */
  #takePhoto {
    position: absolute;
    z-index: 10;
    padding: 15px 25px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    background: #62C370;
    color: #fff;
    transition: 0.2s;
  }

  #takePhoto:hover {
    background: #4CAF50;
  }

  /* Navbar fixe en bas */
  .navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: rgba(255,255,255,0.9);
    border-top: 3px solid #1c1c1c;
    box-shadow: 0 -3px 5px rgba(0,0,0,0.2);
    padding: 10px 0;
    z-index: 20;
  }

  .navbar a {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #1c1c1c;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
  }

  .navbar a span {
    font-size: 20px;
    margin-bottom: 3px;
  }

  .navbar a:hover { color: #62C370; }

</style>
</head>
<body>

<!-- Bouton pour déclencher la caméra -->
<button id="takePhoto">📸 Prendre ma Carte Lycéen</button>

<!-- Container pour afficher la photo en plein écran -->
<div id="photoContainer"></div>

<!-- Input caméra natif caché -->
<input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none;">

<!-- Navbar fixe -->
<div class="navbar">
    <a href="cl.html"><span>🎓</span>Carte Lycéen</a>
    <a href="cc.html"><span>🍽️</span>Carte Cantine</a>
    <a href="#" onclick="openPronote()"><span>📚</span>EDT / Pronote</a>
    <a href="soon.html"><span>📝</span>Mémos</a>
</div>

<script>
// Récupération des éléments
const cameraInput = document.getElementById("cameraInput");
const takePhotoBtn = document.getElementById("takePhoto");
const photoContainer = document.getElementById("photoContainer");

// Ouvre la caméra native
takePhotoBtn.addEventListener("click", () => {
  cameraInput.click();
});

// Quand la photo est prise
cameraInput.addEventListener("change", (event) => {
  const file = event.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      const dataURL = e.target.result;

      // Stocke la photo pour toujours
      localStorage.setItem("carteLycéen", dataURL);

      // Affiche la photo
      afficherPhoto(dataURL);

      // Cache le bouton
      takePhotoBtn.style.display = "none";
    }
    reader.readAsDataURL(file);
  }
});

// Fonction pour afficher la photo
function afficherPhoto(dataURL){
  photoContainer.innerHTML = "";
  const img = document.createElement("img");
  img.src = dataURL;
  photoContainer.appendChild(img);
}

// Vérifie si une photo existe déjà au chargement
window.addEventListener("load", () => {
  const saved = localStorage.getItem("carteLycéen");
  if(saved){
    afficherPhoto(saved);
    takePhotoBtn.style.display = "none";
  }
});

// Fonction pour ouvrir Pronote
function openPronote() {
  let opened = false;
  window.location = "pronote://";
  setTimeout(() => {
    if(!opened) window.location = "https://0330023w.index-education.net/pronote/eleve.html";
  }, 500);
}
</script>

</body>
</html>
