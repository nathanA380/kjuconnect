<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirection</title>
<style>
  @font-face {
    font-family: 'agrandir';
    src: url(Agrandir-Regular.otf) format('opentype');
  }

  body {
    font-family: 'agrandir', sans-serif;
    background: linear-gradient(135deg, #DBFCFF, #7F96FF);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: rgba(255, 255, 255, 0.25);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    text-align: center;
    max-width: 350px;
    animation: fadeIn 1s ease;
  }

  h1 {
    font-size: 1.8em;
    margin-bottom: 15px;
    color: #333;
  }

  p {
    font-size: 1em;
    margin-bottom: 25px;
    color: #444;
  }

  .progress-container {
    width: 100%;
    height: 8px;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .progress-bar {
    height: 100%;
    width: 0;
    background: #7F96FF;
    animation: loadProgress 3s forwards;
  }

  @keyframes loadProgress {
    to { width: 100%; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
<script>
  setTimeout(() => {
    window.location.href = "soon.html"; // Redirige après 3 secondes
  }, 1500);
</script>
</head>
<body>
  <div class="card">
    <h1>Redirection...</h1>
    <p>Merci de patienter un instant</p>
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
  </div>
</body>
</html>
